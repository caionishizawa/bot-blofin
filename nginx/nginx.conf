# ─── NPK Sinais — Nginx Config ───────────────────────────────────────
#
# Instruções para configurar seu domínio:
# 1. Substitua "seudominio.com" pelo seu domínio real
# 2. Para SSL com Let's Encrypt, siga os passos em DEPLOY.md
# 3. Para SSL com certificado próprio, coloque em nginx/ssl/
#

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────
server {
    listen 80;
    server_name seudominio.com www.seudominio.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (dashboard) ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name seudominio.com www.seudominio.com;

    # SSL certificates (Let's Encrypt ou próprio)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL settings (modern)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/html application/javascript text/css;

    # Proxy para FastAPI
    location / {
        proxy_pass         http://npk-web:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}

