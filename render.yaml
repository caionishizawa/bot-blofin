services:
  - type: web
    name: blofin-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_FREE_CHANNEL_ID
        sync: false
      - key: TELEGRAM_VIP_CHANNEL_ID
        sync: false
      - key: TELEGRAM_ADMIN_ID
        sync: false
      - key: TELEGRAM_REF_LINK
        sync: false
      - key: BLOFIN_API_KEY
        sync: false
      - key: BLOFIN_API_SECRET
        sync: false
      - key: BLOFIN_API_PASSPHRASE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: blofin-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: blofin-db
    plan: free
