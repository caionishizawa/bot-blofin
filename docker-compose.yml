version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blofin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blofin_secret}
      POSTGRES_DB: blofin_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blofin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
