version: '3.9'

# ─── NPK Sinais — Docker Compose ─────────────────────────────────────
#
# Serviços:
#   bot   — Bot Telegram + scanner de sinais
#   web   — Dashboard FastAPI (porta interna 8000)
#   nginx — Proxy reverso com SSL (porta 80 + 443)
#
# Uso rápido:
#   cp .env.example .env      # preencha as variáveis
#   docker compose up -d      # sobe tudo
#   docker compose logs -f    # acompanha logs
#
# Para renovar SSL (Let's Encrypt):
#   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d seu-dominio.com
#

services:

  # ─── Bot de sinais ──────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: npk-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/src/data        # SQLite persistente
      - ./logs:/app/src/logs        # Logs do bot
    networks:
      - npk_net

  # ─── Dashboard Web ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: npk-web
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/src/data        # Compartilha DB com o bot (WAL mode)
    networks:
      - npk_net
    expose:
      - "8000"
    depends_on:
      - bot

  # ─── Nginx (proxy reverso + SSL) ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: npk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro                    # Certificados SSL
      - ./nginx/certbot/www:/var/www/certbot:ro          # Desafio ACME
    networks:
      - npk_net
    depends_on:
      - web

networks:
  npk_net:
    driver: bridge

volumes:
  data:
